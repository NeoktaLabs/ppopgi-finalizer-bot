name = "lottery-finalizer-bot"
main = "src/BotFinalizeLottery.ts"
compatibility_date = "2026-02-23"

# Non-secret env vars (safe in git)
[vars]
REGISTRY_ADDRESS = "0xYOUR_REGISTRY_ADDRESS"
RPC_URL = "https://node.mainnet.etherlink.com"
CRON_EVERY_MINUTES = "3"
MAX_TX = "5"
TIME_BUDGET_MS = "25000"
ATTEMPT_TTL_SEC = "600"

# KV binding (you’ll paste the real id after creating KV)
[[kv_namespaces]]
binding = "BOT_STATE"
id = "7be58949d65d4f4d8fa11bab19cbfb0c"