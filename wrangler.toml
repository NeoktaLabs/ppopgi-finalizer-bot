name = "ppopgi-finalizer-bot"
main = "src/BotFinalizeLottery.ts"
compatibility_date = "2026-02-23"

# Non-secret env vars (safe in git)
[vars]
REGISTRY_ADDRESS = "0xa916e20AbF4d57bCb98f7A845eb74f2EB4Dcbed2"
DEPLOYER_ADDRESS = "0xAd0c8Ba0E4e519B4EA97cE945A20E2716dDbDf7D"

RPC_URL = "https://node.mainnet.etherlink.com"

# cron interval (minutes), used only for the status endpoint countdown
CRON_EVERY_MINUTES = "1"

# Tx + runtime limits
MAX_TX = "10"
TIME_BUDGET_MS = "25000"
ATTEMPT_TTL_SEC = "600"

# Registry rolling scan sizing
HOT_SIZE = "200"
COLD_SIZE = "100"

# Deployer log scan tuning (prevents "Block range is too large")
LOG_CHUNK_BLOCKS = "250"
BOOTSTRAP_LOOKBACK_BLOCKS = "50000"
DEPLOYER_HEAD_LAG_BLOCKS = "2"

# TicketsPurchased sold-out fast-path tuning
# How far back (from head) to scan tickets purchases to catch "just sold out" quickly.
TICKETS_LOOKBACK_BLOCKS = "2500"
# How many lottery addresses to include per getLogs(address[]) call.
TICKETS_ADDR_CHUNK = "50"
# Head lag to avoid edge cases on reorg / latest block issues.
TICKETS_HEAD_LAG_BLOCKS = "2"

# extra safety buffer BEFORE forceCancelStuck()
# Hatch opens at +2h on-chain; bot will only cancel after +2h + this buffer.
# Default in code is 900 (15 minutes), but set it explicitly here.
HATCH_EXTRA_DELAY_SEC = "300"

# KV binding
[[kv_namespaces]]
binding = "BOT_STATE"
id = "7be58949d65d4f4d8fa11bab19cbfb0c"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1