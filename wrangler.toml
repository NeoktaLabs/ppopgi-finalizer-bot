name = "ppopgi-finalizer-bot"
main = "src/BotFinalizeLottery.ts"
compatibility_date = "2026-02-23"

# Non-secret env vars (safe in git)
[vars]
REGISTRY_ADDRESS = "0xa916e20AbF4d57bCb98f7A845eb74f2EB4Dcbed2"
DEPLOYER_ADDRESS = "0xAd0c8Ba0E4e519B4EA97cE945A20E2716dDbDf7D"
LOG_CHUNK_BLOCKS = "500"
BOOTSTRAP_LOOKBACK_BLOCKS = "50000"
DEPLOYER_HEAD_LAG_BLOCKS = "2"

RPC_URL = "https://node.mainnet.etherlink.com"
CRON_EVERY_MINUTES = "3"

MAX_TX = "5"
TIME_BUDGET_MS = "25000"
ATTEMPT_TTL_SEC = "600"

# Optional sizing / scalability knobs (recommended defaults)
SAFETY_SCAN_EVERY_RUNS = "30"
HOT_SIZE = "100"
COLD_SIZE = "50"

# KV binding
[[kv_namespaces]]
binding = "BOT_STATE"
id = "7be58949d65d4f4d8fa11bab19cbfb0c"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1